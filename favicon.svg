<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo negro profundo, coincide con la paleta de la web -->
  <rect width="100" height="100" rx="18" fill="#080706"/>

  <!-- Anillo exterior dorado -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#B08545" stroke-width="2.5" stroke-opacity="0.95"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#B08545" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- Pentagrama — estrella de 5 puntas inscrita -->
  <polygon
    points="50,12 72.34,80.74 13.86,38.26 86.14,38.26 27.66,80.74"
    fill="none"
    stroke="#B08545"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    stroke-opacity="0.95"/>

  <!-- Ojo central — punto dorado -->
  <circle cx="50" cy="50" r="2.8" fill="#B08545"/>
</svg>
