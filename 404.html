<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta oculta · Stevv Tarot</title>
  <meta name="description" content="Esta carta no está entre las del mazo. Volvamos al inicio.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0c0a09">
  <link rel="canonical" href="https://stevvtarot.com/">

  <!-- Redirección automática en 8s (fallback si el usuario no hace clic) -->
  <meta http-equiv="refresh" content="8; url=/">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- Fonts (mismas del sitio principal, subset mínimo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-negro:        #080706;
      --c-humo:         #111009;
      --c-dorado:       #B08545;
      --c-dorado-suave: #A87F3E;
      --c-crema:        #f1e6d0;
      --c-crema-suave:  #d9cfbf;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(176,133,69,0.08), transparent 65%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(94,26,31,0.18), transparent 70%),
        var(--c-negro);
      color: var(--c-crema-suave);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2.5rem 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* Ruido sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    .wrap {
      position: relative;
      z-index: 2;
      max-width: 620px;
      text-align: center;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Estrella pentagonal */
    .sigil {
      width: 140px;
      height: 140px;
      margin: 0 auto 2.2rem;
      opacity: 0.85;
      animation: pulse 4s ease-in-out infinite;
    }
    .sigil svg { width: 100%; height: 100%; display: block; }

    @keyframes pulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.03); }
    }

    .label {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      color: var(--c-dorado);
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      opacity: 0.85;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      line-height: 0.95;
      color: var(--c-crema);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--c-dorado);
      opacity: 0.6;
      margin: 1.8rem auto;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.15rem, 2.4vw, 1.4rem);
      color: var(--c-crema-suave);
      line-height: 1.55;
      margin-bottom: 0.7rem;
    }

    .sub {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--c-dorado-suave);
      letter-spacing: 0.05em;
      margin-bottom: 2.8rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 560px) {
      .actions { flex-direction: row; gap: 1.2rem; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.95rem 1.8rem;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, border-color 0.3s, transform 0.3s;
    }

    .btn-primary {
      background: var(--c-dorado);
      color: var(--c-negro);
      border: 1px solid var(--c-dorado);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--c-dorado);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--c-crema);
      border: 1px solid rgba(176,133,69,0.4);
    }
    .btn-ghost:hover {
      border-color: var(--c-dorado);
      color: var(--c-dorado);
      transform: translateY(-2px);
    }

    .btn:focus-visible {
      outline: 2px solid var(--c-dorado);
      outline-offset: 3px;
    }

    .countdown {
      margin-top: 2.5rem;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: var(--c-dorado-suave);
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    .countdown span { color: var(--c-crema); font-weight: 500; }

    @media (prefers-reduced-motion: reduce) {
      .wrap, .sigil { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="sigil" aria-hidden="true">
      <svg viewBox="-90 -90 180 180" xmlns="http://www.w3.org/2000/svg">
        <circle cx="0" cy="0" r="75" fill="none" stroke="#B08545" stroke-width="1.1" stroke-opacity="0.9"/>
        <circle cx="0" cy="0" r="82" fill="none" stroke="#B08545" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="0" cy="0" r="66" fill="none" stroke="#B08545" stroke-width="0.4" stroke-opacity="0.3"/>
        <polygon
          points="0,-62 36.4,50.1 -58.9,-19.2 58.9,-19.2 -36.4,50.1"
          fill="none"
          stroke="#B08545"
          stroke-width="1.3"
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-opacity="0.95"/>
        <circle cx="0" cy="0" r="2.5" fill="#B08545"/>
      </svg>
    </div>

    <p class="label">— Carta oculta —</p>

    <h1>404</h1>

    <div class="divider" aria-hidden="true"></div>

    <p class="message">Esta carta no está entre las del mazo.<br>El camino que buscabas se desvaneció.</p>
    <p class="sub">Volvamos a empezar desde el inicio.</p>

    <nav class="actions" aria-label="Acciones de recuperación">
      <a href="/" class="btn btn-primary" aria-label="Volver a la página de inicio">
        ← Volver al inicio
      </a>
      <a href="https://wa.me/573138620356?text=Hola%20Stevv%2C%20llegu%C3%A9%20a%20una%20p%C3%A1gina%20que%20no%20existe%20y%20quiero%20preguntarte%20algo" class="btn btn-ghost" target="_blank" rel="noopener" aria-label="Escribir a Stevv por WhatsApp">
        Escribir por WhatsApp
      </a>
    </nav>

    <p class="countdown" id="countdown">
      Regresando al inicio en <span id="count">8</span>…
    </p>
  </main>

  <script>
    // Contador visible que acompaña al meta-refresh (accesibilidad + UX).
    // Si el usuario navega o prefiere reduced-motion no hay animación, solo texto.
    (function() {
      const el = document.getElementById('count');
      if (!el) return;
      let n = 8;
      const t = setInterval(() => {
        n -= 1;
        if (n <= 0) { clearInterval(t); return; }
        el.textContent = n;
      }, 1000);
    })();
  </script>
</body>
</html>
